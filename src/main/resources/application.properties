spring.application.name=tierrafertil

# --- Conexion a MySQL ---
# Cada integrante del equipo debe crear localmente una BD llamada tierrafertil_db
# y ajustar usuario/password segun su propio MySQL local.
spring.datasource.url=jdbc:mysql://localhost:3306/tierrafertil_db?useSSL=false&serverTimezone=UTC&createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=Rmirez31302+

# --- JPA / Hibernate ---
# update: crea/actualiza tablas automaticamente segun las entidades (util en desarrollo)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# --- Internacionalizacion (i18n) ---
spring.messages.basename=messages
spring.messages.encoding=UTF-8

# --- Subida de archivos (imagenes de propiedades) ---
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB

server.port=8080
