<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Usuarios - TierraFertil</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container py-4">
    <h2 class="mb-4">Gestion de usuarios</h2>

    <div th:if="${errorRol}" class="alert alert-warning" th:text="${errorRol}"></div>

    <div class="table-responsive">
        <table class="table table-hover align-middle">
            <thead>
            <tr>
                <th>Nombre</th>
                <th>Correo</th>
                <th>Rol actual</th>
                <th style="width: 260px;">Cambiar rol</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="u : ${usuarios}">
                <td th:text="${u.nombre}"></td>
                <td th:text="${u.correo}"></td>
                <td><span class="badge bg-secondary" th:text="${u.rol.nombreRol}"></span></td>
                <td>
                    <form th:action="@{'/admin/usuarios/' + ${u.idUsuario} + '/rol'}" method="post" class="d-flex gap-2">
                        <select name="idRol" class="form-select form-select-sm">
                            <option th:each="r : ${roles}"
                                    th:value="${r.idRol}"
                                    th:selected="${r.idRol == u.rol.idRol}"
                                    th:text="${r.nombreRol}"></option>
                        </select>
                        <button type="submit" class="btn btn-sm btn-primary">Guardar</button>
                    </form>
                </td>
            </tr>
            <tr th:if="${#lists.isEmpty(usuarios)}">
                <td colspan="4" class="text-center text-muted py-4">No hay usuarios registrados.</td>
            </tr>
            </tbody>
        </table>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
