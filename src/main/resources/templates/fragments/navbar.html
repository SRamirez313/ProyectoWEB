<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>
<nav th:fragment="navbar" class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" th:href="@{/}">TierraFertil</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navMenu">
            <ul class="navbar-nav me-auto">
                <li class="nav-item"><a class="nav-link" th:href="@{/propiedades}">Propiedades</a></li>

                <li class="nav-item" sec:authorize="hasRole('CLIENTE')">
                    <a class="nav-link" th:href="@{/cliente/solicitudes}">Mis solicitudes</a>
                </li>
                <li class="nav-item" sec:authorize="hasAnyRole('AGENTE','ADMIN')">
                    <a class="nav-link" th:href="@{/agente/propiedades}">Gestion de propiedades</a>
                </li>
                <li class="nav-item" sec:authorize="hasRole('ADMIN')">
                    <a class="nav-link" th:href="@{/admin/usuarios}">Usuarios</a>
                </li>
            </ul>
            <ul class="navbar-nav">
                <li class="nav-item" sec:authorize="isAuthenticated()">
                    <span class="nav-link text-light" sec:authentication="name"></span>
                </li>
                <li class="nav-item" sec:authorize="isAuthenticated()">
                    <form th:action="@{/logout}" method="post" class="d-inline">
                        <button type="submit" class="btn btn-outline-light btn-sm">Cerrar sesion</button>
                    </form>
                </li>
                <li class="nav-item" sec:authorize="isAnonymous()">
                    <a class="btn btn-warning btn-sm" th:href="@{/login}">Iniciar sesion</a>
                </li>
            </ul>
        </div>
    </div>
</nav>
</body>
</html>
