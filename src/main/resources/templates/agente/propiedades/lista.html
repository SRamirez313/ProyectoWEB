<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Gestion de propiedades - TierraFertil</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>Gestion de propiedades</h2>
        <a th:href="@{/agente/propiedades/nueva}" class="btn btn-primary">+ Nueva propiedad</a>
    </div>

    <div class="table-responsive">
        <table class="table table-hover align-middle">
            <thead>
            <tr>
                <th>Titulo</th>
                <th>Ubicacion</th>
                <th>Tipo</th>
                <th>Precio</th>
                <th>Estado</th>
                <th class="text-end">Acciones</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="p : ${propiedades}">
                <td th:text="${p.titulo}"></td>
                <td th:text="${p.ubicacion.canton + ', ' + p.ubicacion.provincia}"></td>
                <td th:text="${p.tipo.nombreTipo}"></td>
                <td th:text="'₡ ' + ${#numbers.formatDecimal(p.precio, 0, 'COMMA', 0, 'POINT')}"></td>
                <td>
                    <form th:action="@{'/agente/propiedades/' + ${p.idPropiedad} + '/estado'}" method="post" class="d-flex gap-1">
                        <select name="idEstado" class="form-select form-select-sm" onchange="this.form.submit()">
                            <option th:each="e : ${estados}"
                                    th:value="${e.idEstado}"
                                    th:selected="${e.idEstado == p.estado.idEstado}"
                                    th:text="${e.nombreEstado}"></option>
                        </select>
                    </form>
                </td>
                <td class="text-end">
                    <a th:href="@{'/agente/propiedades/' + ${p.idPropiedad} + '/editar'}"
                       class="btn btn-sm btn-outline-secondary">Editar</a>

                    <form th:action="@{'/agente/propiedades/' + ${p.idPropiedad} + '/eliminar'}"
                          method="post" class="d-inline"
                          onsubmit="return confirm('¿Seguro que deseas eliminar esta propiedad? Esta accion no se puede deshacer.');">
                        <button type="submit" class="btn btn-sm btn-outline-danger">Eliminar</button>
                    </form>
                </td>
            </tr>
            <tr th:if="${#lists.isEmpty(propiedades)}">
                <td colspan="6" class="text-center text-muted py-4">Todavia no hay propiedades registradas.</td>
            </tr>
            </tbody>
        </table>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
