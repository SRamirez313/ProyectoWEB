<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${propiedad != null} ? 'Editar propiedad' : 'Nueva propiedad'"></title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container py-4" style="max-width: 640px;">
    <h2 class="mb-4" th:text="${propiedad != null} ? 'Editar propiedad' : 'Nueva propiedad'"></h2>

    <form th:action="${propiedad != null}
                        ? @{'/agente/propiedades/' + ${propiedad.idPropiedad} + '/editar'}
                        : @{/agente/propiedades/nueva}"
          th:object="${propiedadDTO}"
          method="post"
          enctype="multipart/form-data">

        <div class="mb-3">
            <label class="form-label">Titulo</label>
            <input type="text" th:field="*{titulo}" class="form-control"
                   th:classappend="${#fields.hasErrors('titulo')} ? 'is-invalid'">
            <div class="invalid-feedback" th:if="${#fields.hasErrors('titulo')}" th:errors="*{titulo}"></div>
        </div>

        <div class="mb-3">
            <label class="form-label">Descripcion</label>
            <textarea th:field="*{descripcion}" class="form-control" rows="3"></textarea>
        </div>

        <div class="row">
            <div class="col-md-6 mb-3">
                <label class="form-label">Precio (₡)</label>
                <input type="number" step="0.01" th:field="*{precio}" class="form-control"
                       th:classappend="${#fields.hasErrors('precio')} ? 'is-invalid'">
                <div class="invalid-feedback" th:if="${#fields.hasErrors('precio')}" th:errors="*{precio}"></div>
            </div>
            <div class="col-md-6 mb-3">
                <label class="form-label">Tipo de propiedad</label>
                <select th:field="*{idTipo}" class="form-select"
                        th:classappend="${#fields.hasErrors('idTipo')} ? 'is-invalid'">
                    <option value="">Selecciona...</option>
                    <option th:each="t : ${tipos}" th:value="${t.idTipo}" th:text="${t.nombreTipo}"></option>
                </select>
                <div class="invalid-feedback" th:if="${#fields.hasErrors('idTipo')}" th:errors="*{idTipo}"></div>
            </div>
        </div>

        <div class="mb-3">
            <label class="form-label">Estado</label>
            <select th:field="*{idEstado}" class="form-select"
                    th:classappend="${#fields.hasErrors('idEstado')} ? 'is-invalid'">
                <option value="">Selecciona...</option>
                <option th:each="e : ${estados}" th:value="${e.idEstado}" th:text="${e.nombreEstado}"></option>
            </select>
            <div class="invalid-feedback" th:if="${#fields.hasErrors('idEstado')}" th:errors="*{idEstado}"></div>
        </div>

        <div class="row">
            <div class="col-md-4 mb-3">
                <label class="form-label">Provincia</label>
                <input type="text" th:field="*{provincia}" class="form-control"
                       th:classappend="${#fields.hasErrors('provincia')} ? 'is-invalid'">
                <div class="invalid-feedback" th:if="${#fields.hasErrors('provincia')}" th:errors="*{provincia}"></div>
            </div>
            <div class="col-md-4 mb-3">
                <label class="form-label">Canton</label>
                <input type="text" th:field="*{canton}" class="form-control"
                       th:classappend="${#fields.hasErrors('canton')} ? 'is-invalid'">
                <div class="invalid-feedback" th:if="${#fields.hasErrors('canton')}" th:errors="*{canton}"></div>
            </div>
            <div class="col-md-4 mb-3">
                <label class="form-label">Distrito (opcional)</label>
                <input type="text" th:field="*{distrito}" class="form-control">
            </div>
        </div>

        <div class="mb-3">
            <label class="form-label">Imagenes</label>
            <input type="file" name="imagenes" class="form-control" multiple accept="image/*">
            <div class="form-text">Puedes seleccionar varias imagenes a la vez.</div>
        </div>

        <div th:if="${propiedad != null and !#lists.isEmpty(propiedad.imagenes)}" class="mb-3">
            <label class="form-label d-block">Imagenes actuales</label>
            <div class="d-flex gap-2 flex-wrap">
                <img th:each="img : ${propiedad.imagenes}" th:src="@{${img.rutaImagen}}"
                     style="width:90px;height:90px;object-fit:cover;border-radius:6px;">
            </div>
        </div>

        <input type="hidden" th:field="*{idPropiedad}">

        <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary">Guardar cambios</button>
            <a th:href="@{/agente/propiedades}" class="btn btn-outline-secondary">Cancelar</a>
        </div>
    </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
